<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>RTW Dienstplan</title>

<style>
:root{
    --bg:#404040;
    --text:#f5f5f5;
    --green:#00E676;
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    background:var(--bg);
    font-family:Segoe UI,Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    text-align:center;
}

h1{
    color:var(--text);
    font-size:2.2rem;
    font-weight:normal;
    margin-bottom:35px;
}

.status{
    font-size:7rem;
    color:var(--green);
    font-weight:bold;
    margin-bottom:40px;
}

footer{
    color:var(--text);
    font-size:2rem;
}
</style>
</head>

<body>

<div class="card">

<h1>Aktuell in erster Priorität</h1>

<div class="status" id="status">
--
</div>

<footer id="next">
Nächste Änderung: --
</footer>

</div>

<script>

const periods = [
    { start:'07:30', end:'11:30', label:'RTW 2' },
    { start:'11:30', end:'15:30', label:'RTW 3' },
    { start:'15:30', end:'19:30', label:'RTW 1' },
    { start:'19:30', end:'23:30', label:'RTW 2' },
    { start:'23:30', end:'03:30', label:'RTW 3' },
    { start:'03:30', end:'07:30', label:'RTW 1' }
];

function parseHM(hm){
    const [h,m] = hm.split(":").map(Number);
    return h*60+m;
}

function getBerlinMinutes(){

    const now = new Date();

    const parts = now.toLocaleTimeString("de-DE",{
        timeZone:"Europe/Berlin",
        hour:"2-digit",
        minute:"2-digit",
        hour12:false
    }).split(":");

    return Number(parts[0])*60+Number(parts[1]);
}

function findCurrent(mins){

    for(let i=0;i<periods.length;i++){

        const start=parseHM(periods[i].start);
        const end=parseHM(periods[i].end);

        if(start<end){

            if(mins>=start && mins<end)
                return i;

        }else{

            if(mins>=start || mins<end)
                return i;

        }

    }

    return 0;
}

function nextInfo(mins){

    const current=findCurrent(mins);

    let end=parseHM(periods[current].end);

    if(end<=mins)
        end+=1440;

    const diff=end-mins;

    return{

        countdown:
            Math.floor(diff/60)+"h "+
            (diff%60)+"m",

        nextRTW:
            periods[(current+1)%periods.length].label

    };

}

function update(){

    const mins=getBerlinMinutes();

    const current=findCurrent(mins);

    document.getElementById("status").textContent=
        periods[current].label;

    const next=nextInfo(mins);

    document.getElementById("next").textContent=
        "Änderung in "+
        next.countdown+
        " – Danach fährt "+
        next.nextRTW;

}

update();

setInterval(update,60000);

</script>

</body>
</html>
